
<div class="login-wrapper">
    <div class="login-card glass-panel">
        <div class="brand-logo">
            <i class="fa-solid fa-utensils"></i>
            <h1>Anokhi Restro</h1>
        </div>
        <p class="login-subtitle">Management System Login</p>
        
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="login-password-modular" placeholder="Enter Admin Password" autofocus>
        </div>
        
        <button class="btn-login" onclick="handleLogin()">ACCESS SYSTEM</button>
        <p class="forgot-pwd" onclick="openResetModal()">Forgot Password?</p>
    </div>
</div>
